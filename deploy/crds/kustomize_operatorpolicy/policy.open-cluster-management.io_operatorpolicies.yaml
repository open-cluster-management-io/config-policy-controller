---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: operatorpolicies.policy.open-cluster-management.io
spec:
  group: policy.open-cluster-management.io
  names:
    kind: OperatorPolicy
    listKind: OperatorPolicyList
    plural: operatorpolicies
    singular: operatorpolicy
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          OperatorPolicy is the Schema for the operatorpolicies API. Operator policy eases the management
          of OLM operators by providing automation for their management and reporting on the status across
          the various operator objects.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: OperatorPolicySpec defines the desired state of a particular
              operator on the cluster.
            properties:
              complianceType:
                description: |-
                  ComplianceType describes how objects on the cluster should be compared with the configuration
                  policy's object definition. Options are "MustHave", "MustOnlyHave", or "MustNotHave".
                enum:
                - MustHave
                - Musthave
                - musthave
                - MustOnlyHave
                - Mustonlyhave
                - mustonlyhave
                - MustNotHave
                - Mustnothave
                - mustnothave
                type: string
              operatorGroup:
                description: |-
                  OperatorGroup specifies the OperatorGroup to be handled. Include the name, namespace, and any
                  `spec` fields for the OperatorGroup. For more info, see `kubectl explain operatorgroups.spec`
                  or view https://olm.operatorframework.io/docs/concepts/crds/operatorgroup/
                type: object
                x-kubernetes-preserve-unknown-fields: true
              remediationAction:
                description: |-
                  RemediationAction specifies the remediation of the policy. The parameter values are enforce and
                  inform.
                enum:
                - Inform
                - inform
                - Enforce
                - enforce
                type: string
              severity:
                description: |-
                  Severity is a user-defined severity for when an object is found out of compliance with this
                  configuration policy. Accepted values are low, medium, high, and critical.
                enum:
                - low
                - Low
                - medium
                - Medium
                - high
                - High
                - critical
                - Critical
                type: string
              subscription:
                description: |-
                  Subscription specifies the operator Subscription to be handled. Include the namespace, and any
                  `spec` fields for the Subscription. For more info, see `kubectl explain
                  subscriptions.operators.coreos.com.spec` or view
                  https://olm.operatorframework.io/docs/concepts/crds/subscription/
                type: object
                x-kubernetes-preserve-unknown-fields: true
              versions:
                description: |-
                  Versions is a list of nonempty strings that specifies which installed versions are compliant
                  when in 'inform' mode and which InstallPlans are approved when in 'enforce' mode.
                items:
                  minLength: 1
                  type: string
                type: array
            required:
            - complianceType
            - subscription
            type: object
          status:
            description: |-
              OperatorPolicyStatus reports the observed state of the operators resulting from the
              specifications given in the operator policy.
            properties:
              compliant:
                description: ComplianceState reports the most recent compliance state
                  of the operator policy.
                enum:
                - Compliant
                - Pending
                - NonCompliant
                - Terminating
                type: string
              conditions:
                description: Conditions reports historic details on the condition
                  of the operator policy.
                items:
                  description: "Condition contains details for one aspect of the current
                    state of this API Resource.\n---\nThis struct is intended for
                    direct use as an array at the field path .status.conditions.  For
                    example,\n\n\n\ttype FooStatus struct{\n\t    // Represents the
                    observations of a foo's current state.\n\t    // Known .status.conditions.type
                    are: \"Available\", \"Progressing\", and \"Degraded\"\n\t    //
                    +patchMergeKey=type\n\t    // +patchStrategy=merge\n\t    // +listType=map\n\t
                    \   // +listMapKey=type\n\t    Conditions []metav1.Condition `json:\"conditions,omitempty\"
                    patchStrategy:\"merge\" patchMergeKey:\"type\" protobuf:\"bytes,1,rep,name=conditions\"`\n\n\n\t
                    \   // other fields\n\t}"
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: |-
                        type of condition in CamelCase or in foo.example.com/CamelCase.
                        ---
                        Many .condition.type values are consistent across resources like Available, but because arbitrary conditions can be
                        useful (see .node.status.conditions), the ability to deconflict is important.
                        The regex it matches is (dns1123SubdomainFmt/)?(qualifiedNameFmt)
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              relatedObjects:
                description: RelatedObjects reports a list of resources associated
                  with the operator policy.
                items:
                  description: RelatedObject contains the details of an object matched
                    by the configuration policy.
                  properties:
                    compliant:
                      description: |-
                        Compliant is whether the related object is compliant with the configuration policy's
                        definition(s).
                      type: string
                    object:
                      description: ObjectResource contains the identifying fields
                        of the related object.
                      properties:
                        apiVersion:
                          description: API version of the related object.
                          type: string
                        kind:
                          description: Kind of the related object.
                          type: string
                        metadata:
                          description: ObjectMetadata contains the metadata for an
                            object matched by the configuration policy.
                          properties:
                            name:
                              description: Name of the related object.
                              type: string
                            namespace:
                              description: Namespace of the related object.
                              type: string
                          type: object
                      type: object
                    properties:
                      description: Properties are additional properties of the related
                        object relevant to the configuration policy.
                      properties:
                        createdByPolicy:
                          description: |-
                            CreatedByPolicy reports whether the object was created by the configuration policy, which is
                            important when pruning is configured.
                          type: boolean
                        uid:
                          description: |-
                            UID stores the object UID to help track object ownership for deletion when pruning is
                            configured.
                          type: string
                      type: object
                    reason:
                      description: Reason is a human-readable message of why the related
                        object has a particular compliance.
                      type: string
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
